<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>scikick — Settings</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --text-primary: #e4e4e4;
      --accent: #4fc3a1;
      --border: #2a2a4a;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p.subtitle { color: #a0a0b0; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .help-text { font-size: 12px; color: #a0a0b0; margin-top: 4px; }
    button {
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    #status { margin-top: 12px; font-size: 13px; }
    .success { color: var(--accent); }
    .error { color: #e0556a; }
  </style>
</head>
<body>
  <h1>⚙️ Settings</h1>
  <p class="subtitle">Configure your scikick</p>

  <div class="form-group">
    <label for="server-url">Server URL</label>
    <input type="text" id="server-url" value="http://localhost:8742" placeholder="http://localhost:8742">
    <p class="help-text">The address where your local server is running.</p>
  </div>

  <div class="form-group">
    <label for="drive-folder">Default Google Drive Folder ID</label>
    <input type="text" id="drive-folder" placeholder="1abc123... or full URL">
    <p class="help-text">Your project folder in Google Drive. Paste the folder URL or ID.</p>
  </div>

  <div class="form-group">
    <label for="google-creds">Google Credentials File Path</label>
    <input type="text" id="google-creds" placeholder="~/.scientific-paper-assistant/google_credentials.json">
    <p class="help-text">Path to your Google Cloud OAuth2 credentials JSON file (on the server machine).</p>
  </div>

  <button id="btn-save">Save Settings</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
